<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Clash · Stage PROMPTING mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#541fc4', 50: '#f5f0ff', 100: '#ebe1ff', 300: '#b89cff', 600: '#541fc4', 700: '#4118a3' },
            surface: { DEFAULT: '#ffffff', low: '#faf7ff', container: '#f3edff' },
            ink: { DEFAULT: '#1f1633', variant: '#6b5e85', light: '#a89db8' },
            border: { DEFAULT: '#e8e0f4' },
            live: '#ff3838',
          },
          fontFamily: { sans: ['Poppins', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Poppins', system-ui, sans-serif; background: #fff; color: #1f1633; -webkit-font-smoothing: antialiased; }
    .q-display { font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; }
    .q-h1 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
    .q-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #6b5e85; }
    .q-label-primary { color: #4118a3; }
    .q-mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .q-card-elevated { background: #fff; border-radius: 24px;
      box-shadow: 0 2px 4px rgba(84, 31, 196, 0.06), 0 16px 40px rgba(84, 31, 196, 0.10), 0 48px 96px rgba(84, 31, 196, 0.08); }
    .q-pill-primary { background: #f5f0ff; color: #4118a3; padding: 6px 14px; border-radius: 999px; font-size: 14px; font-weight: 500; }
    .q-pill-live { background: #ff3838; color: #fff; padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; }
    .q-stage-bg { background: radial-gradient(circle at top, #f5f0ff 0%, #ffffff 60%); }
    .shadow-cta { box-shadow: 0 1px 2px rgba(84, 31, 196, 0.20), 0 12px 32px rgba(84, 31, 196, 0.24); }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.06); } }
    .anim-pulse { animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <main class="min-h-screen q-stage-bg flex flex-col">

    <header class="px-12 py-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="q-display text-2xl text-primary lowercase">prompt clash</span>
        <span class="q-pill-live">
          <span class="w-2 h-2 rounded-full bg-white anim-pulse"></span>
          CANLI
        </span>
      </div>
      <div class="flex items-center gap-4 text-ink-variant">
        <span class="q-label">MAÇ #12AB</span>
        <span class="text-ink-light">·</span>
        <span class="text-sm font-medium">a single futuristic cyberpunk cat with neon lights</span>
      </div>
    </header>

    <div class="flex-1 px-12 pb-12 flex items-center">
      <div class="w-full max-w-[1440px] mx-auto">
        <div class="grid grid-cols-[1fr_auto_1fr] gap-8 items-stretch">

          <div class="q-card-elevated overflow-hidden flex flex-col min-h-[520px]">
            <div class="px-6 py-4 flex items-center justify-between border-b border-border bg-white">
              <div class="flex items-center gap-3">
                <span class="q-display w-14 h-14 rounded-full bg-primary text-white grid place-items-center text-3xl shadow-cta">A</span>
                <div class="flex flex-col">
                  <span class="q-label">Player A</span>
                  <span class="text-2xl font-semibold text-ink">alice</span>
                </div>
              </div>
            </div>
            <div class="flex-1 p-8 bg-primary-50 flex items-start">
              <p class="q-mono leading-relaxed text-2xl text-ink">
                a futuristic cyberpunk cat with neon eyes on a rainy rooftop in Tokyo
              </p>
            </div>
          </div>

          <div class="flex flex-col items-center gap-5 w-[440px]">
            <span class="q-label text-base">HEDEF GÖRSEL</span>
            <div class="q-card-elevated overflow-hidden w-full aspect-square bg-primary-50">
              <img src="https://picsum.photos/seed/promptclash/600/600" alt="Reference" class="w-full h-full object-cover" />
            </div>
            <div class="inline-flex flex-col items-center gap-2 mt-2">
              <div class="relative" style="width:160px;height:160px;">
                <svg width="160" height="160" style="transform:rotate(-90deg);">
                  <circle cx="80" cy="80" r="74" fill="none" stroke="#ebe1ff" stroke-width="12" />
                  <circle cx="80" cy="80" r="74" fill="none" stroke="#541fc4" stroke-width="12" stroke-linecap="round" stroke-dasharray="465" stroke-dashoffset="155" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center q-display tabular-nums text-ink" style="font-size:64px;">
                  18
                </div>
              </div>
              <span class="q-label text-base">KALAN SÜRE</span>
            </div>
          </div>

          <div class="q-card-elevated overflow-hidden flex flex-col min-h-[520px] ring-2 ring-primary/40">
            <div class="px-6 py-4 flex items-center justify-between border-b border-border bg-white">
              <div class="flex items-center gap-3">
                <span class="q-display w-14 h-14 rounded-full bg-primary text-white grid place-items-center text-3xl shadow-cta">B</span>
                <div class="flex flex-col">
                  <span class="q-label">Player B</span>
                  <span class="text-2xl font-semibold text-ink">bob</span>
                </div>
              </div>
              <span class="q-pill-primary">Gönderildi ✓</span>
            </div>
            <div class="flex-1 p-8 bg-primary-50 flex items-start">
              <p class="q-mono leading-relaxed text-2xl text-ink">
                a stray cat under a glowing pink sign, wet pavement reflecting the city
              </p>
            </div>
          </div>

        </div>
      </div>
    </div>

  </main>
</body>
</html>
