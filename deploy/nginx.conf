# prompt-clash reverse proxy — LIVE config on the VM.
#
# TLS model: the domain stays Cloudflare-PROXIED (orange cloud, DDoS protection).
# Cloudflare terminates the public cert; origin (this nginx) serves 443 with a
# self-signed cert and Cloudflare SSL/TLS mode is "Full". So NO certbot here.
# (deploy/provision.sh's certbot step is for the DNS-only alternative; skip it
# when keeping Cloudflare proxy.)
#
# /uploads/ is served straight off disk by nginx — Next.js does NOT serve files
# written to public/ at runtime, so generated images must bypass the app.

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
  listen 80;
  listen [::]:80;
  server_name promptclash.ieu.app;
  client_max_body_size 12m;

  location /uploads/ {
    alias /opt/prompt-clash/uploads/;
    access_log off;
    expires 1h;
    try_files $uri =404;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name promptclash.ieu.app;
  ssl_certificate     /etc/ssl/promptclash/origin.crt;
  ssl_certificate_key /etc/ssl/promptclash/origin.key;
  client_max_body_size 12m;

  location /uploads/ {
    alias /opt/prompt-clash/uploads/;
    access_log off;
    expires 1h;
    try_files $uri =404;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
