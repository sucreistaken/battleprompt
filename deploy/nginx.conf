# prompt-clash reverse proxy. Placed at /etc/nginx/sites-available/prompt-clash.
# `certbot --nginx` rewrites this to add the TLS (443) block + HTTP->HTTPS
# redirect automatically. __DOMAIN__ is substituted by provision.sh.

# Required so Socket.io's WebSocket upgrade is forwarded correctly.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name __DOMAIN__;

  # Player nickname avatars / uploads can be a bit large.
  client_max_body_size 12m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long-lived sockets — don't cut idle connections mid-match.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
