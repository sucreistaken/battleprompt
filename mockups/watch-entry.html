<!doctype html>
<html lang="tr" data-pc-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>İzleyici olarak katıl · Prompt Clash</title>
<meta name="description" content="Maçı seyret, beğendiğin görsele oy ver. Kayıt gerekmez." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  :root{
    --pc-ink:#22202b; --pc-ink2:#2d2b38; --pc-ink3:#383545;
    --pc-line:#4a4757; --pc-line2:#615d72;
    --pc-text:#f7f4ec; --pc-text2:#c0bdca; --pc-text3:#a8a4b3; --pc-text4:#605d6c;
    --pc-bone:#ffffff; --pc-live:#ff5c5c;
    --pc-accent:#7c4dff; --pc-accent2:#5a35cc;
    --pc-b:#aed24a;
    --r-sm:8px; --r-md:10px; --r-lg:14px;
    --pixel:'Silkscreen',monospace;
    --body:'Inter Tight','IBM Plex Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--pc-ink)}
  body{color:var(--pc-text);font-family:var(--body);min-height:100dvh;
    position:relative;overflow-x:hidden;line-height:1.5;
    -webkit-font-smoothing:antialiased}

  .bg-glow{position:fixed;z-index:0;pointer-events:none;width:780px;height:780px;
    left:-220px;top:-220px;
    background:radial-gradient(circle at center,rgba(174,210,74,.12) 0%,rgba(174,210,74,.02) 42%,transparent 64%);
    filter:blur(22px)}
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(174,210,74,.022) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(174,210,74,.022) 1px,transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse 90% 50% at 50% 14%,#000 14%,transparent 72%)}

  .shell{position:relative;z-index:1;max-width:560px;margin:0 auto;
    padding:14px 18px 36px}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:2px 0 14px;border-bottom:1px solid var(--pc-ink3)}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:30px;height:30px;flex:none;image-rendering:pixelated}
  .wm{font-family:var(--pixel);font-size:13px;letter-spacing:.06em;color:var(--pc-bone)}
  .wm .a{color:var(--pc-accent)}
  .topright{display:flex;align-items:center;gap:8px;flex:none}
  .back{display:inline-flex;align-items:center;gap:5px;
    font-family:var(--mono);font-size:10.5px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--pc-text3);
    text-decoration:none;padding:5px 8px;border-radius:6px}
  .back:hover{color:var(--pc-text);background:var(--pc-ink2)}
  .lang{display:inline-flex;gap:0;padding:2px 3px;
    background:color-mix(in srgb,var(--pc-ink) 75%,transparent);
    border:1px solid var(--pc-line);border-radius:999px;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase}
  .lang button{appearance:none;border:none;background:transparent;
    padding:3px 8px;color:var(--pc-text3);font:inherit;cursor:pointer;min-height:26px}
  .lang button.on{color:var(--pc-accent);font-weight:600}
  .lang .sep{width:1px;background:var(--pc-line);opacity:.6;margin:3px 0}

  .head{display:flex;flex-direction:column;gap:10px;padding:18px 0 12px}
  .tag{display:inline-flex;align-items:center;align-self:flex-start;gap:8px;
    padding:4px 10px;border-radius:999px;
    background:rgba(174,210,74,.10);border:1px solid rgba(174,210,74,.34);
    font-family:var(--pixel);font-size:10.5px;letter-spacing:.10em;color:var(--pc-b)}
  .tag .d{width:6px;height:6px;background:var(--pc-b);flex:none;
    box-shadow:0 0 8px rgba(174,210,74,.5)}
  .head h1{font-family:var(--body);font-size:clamp(26px,7vw,30px);font-weight:700;
    color:var(--pc-bone);letter-spacing:-.005em;line-height:1.18;margin:0}
  .head h1 .a{color:var(--pc-b)}
  .head .sub{font-family:var(--body);font-size:14px;color:var(--pc-text2);
    line-height:1.5;margin:0;max-width:46ch}

  /* Mascot mini — "AI HAKEM" izleyiciyi karşılıyor */
  .mascot-host{display:flex;flex-direction:column;align-items:center;
    gap:9px;padding:10px 0 16px;position:relative}
  .mascot-frame{position:relative;width:104px;height:104px;
    display:flex;align-items:center;justify-content:center;flex:none}
  .mascot-frame .halo{position:absolute;inset:-16px;z-index:0;pointer-events:none;
    background:radial-gradient(circle at center,
      rgba(174,210,74,.22) 0%,rgba(174,210,74,.05) 40%,transparent 64%);
    filter:blur(8px)}
  .mascot{position:relative;z-index:1;width:84px;height:84px;
    image-rendering:pixelated;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.45)) drop-shadow(0 0 10px rgba(174,210,74,.2));
    animation:mascotFloat 5.2s ease-in-out infinite}
  @keyframes mascotFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
  }
  @media(prefers-reduced-motion:reduce){.mascot{animation:none}}

  /* Room strip — oda kimliği */
  .room-strip{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:11px 14px;background:var(--pc-ink2);
    border:1px solid var(--pc-ink3);border-radius:var(--r-md)}
  .room-strip .lbl{font-family:var(--mono);font-size:10px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--pc-text3);flex:none}
  .room-strip .code{font-family:var(--pixel);font-size:18px;color:var(--pc-bone);
    letter-spacing:.08em;line-height:1;flex:none}
  .room-strip .sep{color:var(--pc-text4)}
  .room-strip .name{font-family:var(--body);font-size:13.5px;color:var(--pc-text2);
    line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Form */
  .form{margin-top:16px;display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .lbl{font-family:var(--mono);font-size:10.5px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--pc-text3);
    padding-left:2px;display:flex;align-items:center;gap:10px}
  .lbl::before{content:'';width:16px;height:1px;background:var(--pc-line2)}
  .opt{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--pc-text4);font-weight:600}
  .input{height:52px;border-radius:var(--r-md);background:var(--pc-ink2);
    border:1.5px solid var(--pc-line);padding:0 16px;
    font-family:var(--body);font-size:15px;color:var(--pc-text);outline:none;width:100%;
    transition:border-color .16s,box-shadow .16s}
  .input:focus{border-color:var(--pc-accent);
    box-shadow:0 0 0 3px rgba(124,77,255,.18)}
  .helper{font-family:var(--body);font-size:12.5px;color:var(--pc-text3);line-height:1.45;padding-left:2px}

  .cta{display:inline-flex;align-items:center;justify-content:center;gap:10px;
    min-height:60px;border-radius:var(--r-md);
    background:var(--pc-accent);color:#fff;border:none;
    font-family:var(--body);font-size:16px;font-weight:800;letter-spacing:.005em;cursor:pointer;
    margin-top:4px;
    box-shadow:0 10px 28px rgba(124,77,255,.32),inset 0 -2px 0 rgba(0,0,0,.18);
    transition:transform .1s,box-shadow .16s}
  .cta:hover{box-shadow:0 14px 36px rgba(124,77,255,.44),inset 0 -2px 0 rgba(0,0,0,.18)}
  .cta:active{transform:translateY(1px)}
  .cta .arrow{font-family:var(--pixel);font-size:18px}

  /* Info row — conditional (voting off) */
  .info-row{margin-top:14px;padding:11px 14px;border-radius:var(--r-md);
    background:rgba(124,77,255,.06);border:1px solid rgba(124,77,255,.25);
    display:flex;align-items:center;gap:10px}
  .info-row .ico{width:17px;height:17px;flex:none;color:var(--pc-accent)}
  .info-row .text{font-family:var(--body);font-size:13px;color:var(--pc-text2);line-height:1.45}

  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--pc-accent);outline-offset:2px}

  @media(min-width:640px){
    .shell{padding:20px 24px 48px}
    .head{padding:24px 0 14px}
    .mascot-frame{width:112px;height:112px}
    .mascot{width:92px;height:92px}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ax" viewBox="0 0 512 512" shape-rendering="crispEdges">
    <g fill="#aed24a"><rect x="64" y="64" width="32" height="32"/><rect x="96" y="32" width="32" height="80"/><rect x="128" y="64" width="32" height="32"/><rect x="208" y="16" width="32" height="96"/><rect x="240" y="0" width="32" height="112"/><rect x="272" y="16" width="32" height="96"/><rect x="352" y="64" width="32" height="32"/><rect x="384" y="32" width="32" height="80"/><rect x="416" y="64" width="32" height="32"/></g>
    <g fill="#7c4dff"><rect x="96" y="112" width="320" height="32"/><rect x="64" y="144" width="384" height="32"/><rect x="32" y="176" width="448" height="32"/><rect x="32" y="208" width="448" height="32"/><rect x="32" y="240" width="448" height="32"/><rect x="32" y="272" width="448" height="32"/><rect x="32" y="304" width="448" height="32"/><rect x="32" y="336" width="448" height="32"/><rect x="64" y="368" width="384" height="32"/><rect x="96" y="400" width="64" height="32"/><rect x="208" y="400" width="96" height="32"/><rect x="352" y="400" width="64" height="32"/><rect x="96" y="432" width="64" height="48"/><rect x="352" y="432" width="64" height="48"/></g>
    <g fill="#f5f5f8"><rect x="208" y="240" width="96" height="32"/><rect x="176" y="272" width="160" height="32"/><rect x="144" y="304" width="224" height="32"/><rect x="144" y="336" width="224" height="32"/><rect x="176" y="368" width="160" height="32"/></g>
    <g fill="#ffffff"><rect x="96" y="208" width="64" height="64"/><rect x="352" y="208" width="64" height="64"/></g>
    <g fill="#14121a"><rect x="128" y="224" width="32" height="48"/><rect x="352" y="224" width="32" height="48"/></g>
    <g fill="#ffffff"><rect x="128" y="224" width="16" height="16"/><rect x="352" y="224" width="16" height="16"/></g>
    <rect x="240" y="336" width="32" height="16" fill="#5a35cc"/>
  </symbol>
</svg>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="shell">
  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 512 512" aria-hidden="true"><use href="#ax"/></svg>
      <span class="wm">PROMPT <span class="a">CLASH</span></span>
    </div>
    <div class="topright">
      <a class="back" href="/">← Ana sayfa</a>
      <div class="lang" role="group" aria-label="Dil">
        <button class="on" type="button" aria-pressed="true">TR</button>
        <span class="sep"></span>
        <button type="button" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>

  <section class="head">
    <span class="tag"><span class="d"></span>İZLE · OY VER · KAZANANI BELİRLE</span>
    <h1>İki AI, bir referans.<br/><span class="a">Kazananı sen söyle.</span></h1>
    <p class="sub">Maçı seyret, beğendiğin görsele oy ver. Kayıt gerekmez.</p>
  </section>

  <section class="mascot-host" aria-label="AI Hakem">
    <div class="mascot-frame">
      <div class="halo" aria-hidden="true"></div>
      <svg class="mascot" viewBox="0 0 512 512" aria-hidden="true"><use href="#ax"/></svg>
    </div>
  </section>

  <div class="room-strip">
    <span class="lbl">Oda</span>
    <span class="code">DX22DT</span>
    <span class="sep" aria-hidden="true">·</span>
    <span class="name">Cuma akşamı stüdyo</span>
  </div>

  <form class="form" onsubmit="event.preventDefault()">
    <div class="field">
      <div class="field-h">
        <label class="lbl" for="nick">Takma ad</label>
        <span class="opt">opsiyonel</span>
      </div>
      <input id="nick" class="input" type="text" inputmode="text" autocomplete="off" maxlength="20" placeholder="Boş bırakırsan anonim katılırsın" />
    </div>

    <button class="cta" type="submit">
      İzleyici olarak katıl
      <span class="arrow">→</span>
    </button>

    <div class="info-row" role="note">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
      <span class="text">Bu odada izleyici oyu yok — sonucu AI seçer, sen izlersin.</span>
    </div>
  </form>
</div>

</body>
</html>
