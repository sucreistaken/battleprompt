<!doctype html>
<html lang="tr" data-pc-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Room Not Found — mobile · Prompt Clash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  :root{
    --pc-ink:#22202b; --pc-ink2:#2d2b38; --pc-ink3:#383545;
    --pc-line:#4a4757; --pc-line2:#615d72;
    --pc-text:#f7f4ec; --pc-text2:#c0bdca; --pc-text3:#a8a4b3; --pc-text4:#605d6c;
    --pc-bone:#ffffff; --pc-live:#ff5c5c;
    --pc-accent:#7c4dff; --pc-b:#aed24a;
    --r-sm:8px; --r-md:10px; --r-lg:14px;
    --pixel:'Silkscreen',monospace;
    --body:'Inter Tight','IBM Plex Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#15131c}
  body{color:var(--pc-text);font-family:var(--body);min-height:100dvh}

  .preview-stage{min-height:100dvh;padding:32px 16px;
    display:flex;flex-direction:column;align-items:center;gap:20px;
    background:radial-gradient(circle at 50% 10%,rgba(255,92,92,.08),transparent 50%),#15131c}
  .preview-head{font-family:var(--mono);font-size:11px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--pc-text3);
    text-align:center;line-height:1.6}
  .preview-head .px{color:var(--pc-live)}
  .phone{width:390px;max-width:100%;height:780px;border-radius:42px;
    background:var(--pc-ink);
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 8px #0c0a12,
               inset 0 0 0 1px rgba(255,255,255,.04);
    overflow:hidden;position:relative}
  .phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:122px;height:28px;background:#0c0a12;
    border-radius:0 0 18px 18px;z-index:50;pointer-events:none}
  .phone-scroll{position:absolute;inset:0;overflow:auto;overscroll-behavior:contain;
    display:flex;flex-direction:column}
  .phone-scroll::-webkit-scrollbar{width:0}

  .bg-glow{position:absolute;z-index:0;pointer-events:none;width:520px;height:520px;
    left:50%;top:-180px;transform:translateX(-50%);
    background:radial-gradient(circle at center,rgba(255,92,92,.10) 0%,rgba(255,92,92,.02) 42%,transparent 64%);
    filter:blur(22px)}
  .bg-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(255,92,92,.022) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,92,92,.022) 1px,transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse 90% 60% at 50% 30%,#000 12%,transparent 72%);opacity:.6}

  .shell{position:relative;z-index:1;padding:12px 18px;width:100%;
    padding-top:max(36px,env(safe-area-inset-top,36px))}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:0 0 10px;border-bottom:1px solid var(--pc-ink3)}
  .brand{display:flex;align-items:center;gap:8px}
  .brand svg{width:28px;height:28px;flex:none;image-rendering:pixelated}
  .wm{font-family:var(--pixel);font-size:12px;letter-spacing:.06em;color:var(--pc-bone)}
  .wm .a{color:var(--pc-accent)}
  .lang{display:inline-flex;gap:0;padding:2px 3px;
    background:color-mix(in srgb,var(--pc-ink) 75%,transparent);
    border:1px solid var(--pc-line);border-radius:999px;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase}
  .lang button{appearance:none;border:none;background:transparent;
    padding:3px 7px;color:var(--pc-text3);font:inherit;cursor:pointer;min-height:24px}
  .lang button.on{color:var(--pc-accent);font-weight:600}
  .lang .sep{width:1px;background:var(--pc-line);opacity:.6;margin:3px 0}

  .empty{flex:1;position:relative;z-index:1;
    display:flex;align-items:center;justify-content:center;padding:24px 18px}
  .empty-inner{display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;width:100%}
  .mark-wrap{position:relative;width:108px;height:108px;
    display:flex;align-items:center;justify-content:center}
  .mark-wrap .halo{position:absolute;inset:-14px;
    background:radial-gradient(circle at center,
      rgba(255,92,92,.18) 0%,rgba(255,92,92,.04) 40%,transparent 64%);
    filter:blur(8px)}
  .mark{position:relative;z-index:1;width:88px;height:88px;
    image-rendering:pixelated;opacity:.62;filter:grayscale(.4) saturate(.7);
    animation:idleFloat 6s ease-in-out infinite}
  @keyframes idleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @media(prefers-reduced-motion:reduce){.mark{animation:none}}

  .err-code{display:inline-flex;align-items:center;gap:8px;
    padding:4px 10px;border-radius:999px;
    background:rgba(255,92,92,.10);border:1px solid rgba(255,92,92,.34);
    font-family:var(--pixel);font-size:10px;letter-spacing:.10em;color:var(--pc-live)}
  .err-code .d{width:5px;height:5px;background:var(--pc-live);flex:none;
    box-shadow:0 0 8px rgba(255,92,92,.5)}
  h1{font-family:var(--pixel);font-size:24px;color:var(--pc-bone);
    letter-spacing:.04em;font-weight:400;line-height:1.2;margin:0}
  .desc{font-family:var(--body);font-size:13.5px;color:var(--pc-text2);
    line-height:1.55;margin:0}
  .actions{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:9px;
    min-height:54px;border-radius:var(--r-md);background:var(--pc-accent);color:#fff;border:none;
    font-family:var(--body);font-size:14.5px;font-weight:800;cursor:pointer;text-decoration:none;
    box-shadow:0 10px 24px rgba(124,77,255,.30),inset 0 -2px 0 rgba(0,0,0,.18)}
  .cta .arrow{font-family:var(--pixel);font-size:16px}
  .cta-secondary{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    min-height:44px;border-radius:var(--r-md);background:transparent;
    border:1.5px solid var(--pc-line);color:var(--pc-text);
    font-family:var(--body);font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none}

  .foot{padding:14px 18px;text-align:center;font-family:var(--mono);font-size:9.5px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--pc-text4);position:relative;z-index:1}
  .foot .ax{color:var(--pc-b);letter-spacing:.06em;margin-right:6px}

  button:focus-visible,a:focus-visible{outline:2px solid var(--pc-accent);outline-offset:2px}

  @media(max-width:440px){
    .preview-stage{padding:0;background:var(--pc-ink)}
    .preview-head{display:none}
    .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}
    .phone::before{display:none}
    .phone-scroll{position:relative;inset:auto;height:auto;overflow:visible;display:flex}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ax" viewBox="0 0 512 512" shape-rendering="crispEdges">
    <g fill="#aed24a"><rect x="64" y="64" width="32" height="32"/><rect x="96" y="32" width="32" height="80"/><rect x="128" y="64" width="32" height="32"/><rect x="208" y="16" width="32" height="96"/><rect x="240" y="0" width="32" height="112"/><rect x="272" y="16" width="32" height="96"/><rect x="352" y="64" width="32" height="32"/><rect x="384" y="32" width="32" height="80"/><rect x="416" y="64" width="32" height="32"/></g>
    <g fill="#7c4dff"><rect x="96" y="112" width="320" height="32"/><rect x="64" y="144" width="384" height="32"/><rect x="32" y="176" width="448" height="32"/><rect x="32" y="208" width="448" height="32"/><rect x="32" y="240" width="448" height="32"/><rect x="32" y="272" width="448" height="32"/><rect x="32" y="304" width="448" height="32"/><rect x="32" y="336" width="448" height="32"/><rect x="64" y="368" width="384" height="32"/><rect x="96" y="400" width="64" height="32"/><rect x="208" y="400" width="96" height="32"/><rect x="352" y="400" width="64" height="32"/><rect x="96" y="432" width="64" height="48"/><rect x="352" y="432" width="64" height="48"/></g>
    <g fill="#f5f5f8"><rect x="208" y="240" width="96" height="32"/><rect x="176" y="272" width="160" height="32"/><rect x="144" y="304" width="224" height="32"/><rect x="144" y="336" width="224" height="32"/><rect x="176" y="368" width="160" height="32"/></g>
    <g fill="#ffffff"><rect x="96" y="208" width="64" height="64"/><rect x="352" y="208" width="64" height="64"/></g>
    <g fill="#14121a"><rect x="128" y="224" width="32" height="48"/><rect x="352" y="224" width="32" height="48"/></g>
    <g fill="#ffffff"><rect x="128" y="224" width="16" height="16"/><rect x="352" y="224" width="16" height="16"/></g>
    <rect x="240" y="336" width="32" height="16" fill="#5a35cc"/>
  </symbol>
</svg>

<div class="preview-stage">
  <div class="preview-head">
    <span class="px">▣</span> 404 not found — <span class="px">mobile</span> · 390×780
  </div>
  <div class="phone">
    <div class="phone-scroll">
      <div class="bg-glow"></div>
      <div class="bg-grid"></div>

      <div class="shell">
        <header class="topbar">
          <div class="brand">
            <svg viewBox="0 0 512 512" aria-hidden="true"><use href="#ax"/></svg>
            <span class="wm">PROMPT <span class="a">CLASH</span></span>
          </div>
          <div class="lang" role="group" aria-label="Dil">
            <button class="on" type="button" aria-pressed="true">TR</button>
            <span class="sep"></span>
            <button type="button" aria-pressed="false">EN</button>
          </div>
        </header>
      </div>

      <section class="empty">
        <div class="empty-inner">
          <div class="mark-wrap">
            <div class="halo" aria-hidden="true"></div>
            <svg class="mark" viewBox="0 0 512 512" aria-hidden="true"><use href="#ax"/></svg>
          </div>
          <span class="err-code"><span class="d"></span>404 · ODA BULUNAMADI</span>
          <h1>BU ODA YOK ARTIK.</h1>
          <p class="desc">Kod yanlış olabilir, ya da maç bitmiş olabilir. Kontrol et, ya da yeni oda aç.</p>
          <div class="actions">
            <a class="cta" href="/">Ana sayfaya dön<span class="arrow">→</span></a>
            <a class="cta-secondary" href="/create-room">Yeni oda oluştur</a>
          </div>
        </div>
      </section>

      <footer class="foot">
        <span class="ax">▣</span>PROMPT CLASH · 2026
      </footer>
    </div>
  </div>
</div>

</body>
</html>
