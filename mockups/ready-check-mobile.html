<!doctype html>
<html lang="tr" data-pc-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ready Check — mobile · Prompt Clash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  :root{
    --pc-ink:#22202b; --pc-ink2:#2d2b38; --pc-ink3:#383545;
    --pc-line:#4a4757; --pc-line2:#615d72;
    --pc-text:#f7f4ec; --pc-text2:#c0bdca; --pc-text3:#a8a4b3; --pc-text4:#605d6c;
    --pc-bone:#ffffff; --pc-accent:#7c4dff; --pc-accent2:#5a35cc;
    --pc-b:#aed24a; --pc-b2:#88aa2e;
    --r-sm:8px; --r-md:10px; --r-lg:14px;
    --pixel:'Silkscreen',monospace;
    --body:'Inter Tight','IBM Plex Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#15131c}
  body{color:var(--pc-text);font-family:var(--body);min-height:100dvh}

  .preview-stage{min-height:100dvh;padding:32px 16px;
    display:flex;flex-direction:column;align-items:center;gap:20px;
    background:radial-gradient(circle at 20% 10%,rgba(124,77,255,.08),transparent 50%),#15131c}
  .preview-head{font-family:var(--mono);font-size:11px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;color:var(--pc-text3);
    text-align:center;line-height:1.6}
  .preview-head .px{color:var(--pc-accent)}
  .phone{width:390px;max-width:100%;height:780px;border-radius:42px;
    background:var(--pc-ink);
    box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 8px #0c0a12,
               inset 0 0 0 1px rgba(255,255,255,.04);
    overflow:hidden;position:relative}
  .phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:122px;height:28px;background:#0c0a12;
    border-radius:0 0 18px 18px;z-index:50;pointer-events:none}
  .phone-scroll{position:absolute;inset:0;overflow:auto;overscroll-behavior:contain}
  .phone-scroll::-webkit-scrollbar{width:0}

  .bg-glow{position:absolute;z-index:0;pointer-events:none;width:520px;height:520px;
    left:-160px;top:-180px;
    background:radial-gradient(circle at center,rgba(124,77,255,.14) 0%,rgba(124,77,255,.02) 42%,transparent 64%);
    filter:blur(22px)}
  .bg-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(124,77,255,.022) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(124,77,255,.022) 1px,transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse 90% 50% at 50% 16%,#000 12%,transparent 72%)}
  .shell{position:relative;z-index:1;padding:12px 18px 28px;
    padding-top:max(36px,env(safe-area-inset-top,36px))}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:0 0 10px;border-bottom:1px solid var(--pc-ink3)}
  .brand{display:flex;align-items:center;gap:8px}
  .brand svg{width:28px;height:28px;flex:none;image-rendering:pixelated}
  .wm{font-family:var(--pixel);font-size:12px;letter-spacing:.06em;color:var(--pc-bone)}
  .wm .a{color:var(--pc-accent)}
  .topright{display:flex;align-items:center;gap:6px}
  .back{display:inline-flex;align-items:center;gap:4px;
    font-family:var(--mono);font-size:10px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--pc-text3);
    text-decoration:none;padding:4px 6px;border-radius:6px}
  .lang{display:inline-flex;gap:0;padding:2px 3px;
    background:color-mix(in srgb,var(--pc-ink) 75%,transparent);
    border:1px solid var(--pc-line);border-radius:999px;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase}
  .lang button{appearance:none;border:none;background:transparent;
    padding:3px 7px;color:var(--pc-text3);font:inherit;cursor:pointer;min-height:24px}
  .lang button.on{color:var(--pc-accent);font-weight:600}
  .lang .sep{width:1px;background:var(--pc-line);opacity:.6;margin:3px 0}

  .head{display:flex;flex-direction:column;gap:8px;padding:14px 0 10px}
  .tag{display:inline-flex;align-items:center;align-self:flex-start;gap:7px;
    padding:4px 10px;border-radius:999px;
    background:rgba(124,77,255,.10);border:1px solid rgba(124,77,255,.34);
    font-family:var(--pixel);font-size:9.5px;letter-spacing:.10em;color:var(--pc-accent)}
  .tag .d{width:5px;height:5px;background:var(--pc-accent);flex:none;
    box-shadow:0 0 8px rgba(124,77,255,.5)}
  .tag.ready{background:rgba(174,210,74,.10);border-color:rgba(174,210,74,.34);color:var(--pc-b)}
  .tag.ready .d{background:var(--pc-b);box-shadow:0 0 8px rgba(174,210,74,.5)}
  .head h1{font-family:var(--body);font-size:22px;font-weight:700;
    color:var(--pc-bone);letter-spacing:-.005em;line-height:1.18;margin:0}
  .head .sub{font-family:var(--body);font-size:13.5px;color:var(--pc-text2);
    line-height:1.5;margin:0}

  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch;
    padding:8px 0 4px}
  .pcard{display:flex;flex-direction:column;align-items:center;gap:7px;
    padding:13px 10px;background:var(--pc-ink2);
    border:1.5px solid var(--pc-line);border-radius:var(--r-md);min-width:0}
  .pcard.me{border-color:var(--pc-accent);
    box-shadow:inset 0 -2px 0 rgba(124,77,255,.28)}
  .pcard.opp{border-color:var(--pc-line2);border-style:dashed}
  .pcard.ready{border-color:var(--pc-b);border-style:solid;
    box-shadow:inset 0 -2px 0 rgba(174,210,74,.28)}
  .ava{width:42px;height:42px;flex:none;display:inline-flex;
    align-items:center;justify-content:center;
    font-family:var(--pixel);font-size:16px;letter-spacing:.04em;
    border-radius:3px;image-rendering:pixelated}
  .ava.me{background:var(--pc-accent);color:#fff;
    box-shadow:inset 0 -3px 0 var(--pc-accent2),inset 0 1px 0 rgba(255,255,255,.18)}
  .ava.opp{background:var(--pc-b);color:#0e0e10;
    box-shadow:inset 0 -3px 0 var(--pc-b2),inset 0 1px 0 rgba(255,255,255,.20)}
  .pname{font-family:var(--body);font-size:12.5px;font-weight:700;color:var(--pc-bone);
    text-align:center;line-height:1.2;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
  .pstate{display:inline-flex;align-items:center;gap:5px;
    font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--pc-text3)}
  .pstate .pd{width:5px;height:5px;background:var(--pc-text3);flex:none}
  .pstate.ready{color:var(--pc-b)}
  .pstate.ready .pd{background:var(--pc-b);box-shadow:0 0 6px rgba(174,210,74,.6)}
  .pstate.waiting .pd{background:var(--pc-text4);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @media(prefers-reduced-motion:reduce){.pstate.waiting .pd{animation:none}}
  .vs-mid{display:flex;align-items:center;justify-content:center;
    font-family:var(--pixel);font-size:13px;letter-spacing:.04em;
    color:var(--pc-text3);padding:0 3px;min-width:24px;flex:none}

  .ready-row{margin-top:14px;display:flex;flex-direction:column;gap:6px}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:9px;
    min-height:58px;border-radius:var(--r-md);
    background:var(--pc-accent);color:#fff;border:none;
    font-family:var(--body);font-size:15.5px;font-weight:800;cursor:pointer;
    box-shadow:0 10px 26px rgba(124,77,255,.30),inset 0 -2px 0 rgba(0,0,0,.18)}
  .cta:active{transform:translateY(1px)}
  .cta .arrow{font-family:var(--pixel);font-size:17px}
  .cta.done{background:rgba(174,210,74,.12);color:var(--pc-b);
    border:1.5px solid var(--pc-b);box-shadow:inset 0 -2px 0 rgba(174,210,74,.20);cursor:default}
  .cta-secondary{display:inline-flex;align-items:center;justify-content:center;
    min-height:42px;background:transparent;border:none;color:var(--pc-text3);
    font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;cursor:pointer;text-decoration:none}

  button:focus-visible,a:focus-visible{outline:2px solid var(--pc-accent);outline-offset:2px}

  @media(max-width:440px){
    .preview-stage{padding:0;background:var(--pc-ink)}
    .preview-head{display:none}
    .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}
    .phone::before{display:none}
    .phone-scroll{position:relative;inset:auto;height:auto;overflow:visible}
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ax" viewBox="0 0 512 512" shape-rendering="crispEdges">
    <g fill="#aed24a"><rect x="64" y="64" width="32" height="32"/><rect x="96" y="32" width="32" height="80"/><rect x="128" y="64" width="32" height="32"/><rect x="208" y="16" width="32" height="96"/><rect x="240" y="0" width="32" height="112"/><rect x="272" y="16" width="32" height="96"/><rect x="352" y="64" width="32" height="32"/><rect x="384" y="32" width="32" height="80"/><rect x="416" y="64" width="32" height="32"/></g>
    <g fill="#7c4dff"><rect x="96" y="112" width="320" height="32"/><rect x="64" y="144" width="384" height="32"/><rect x="32" y="176" width="448" height="32"/><rect x="32" y="208" width="448" height="32"/><rect x="32" y="240" width="448" height="32"/><rect x="32" y="272" width="448" height="32"/><rect x="32" y="304" width="448" height="32"/><rect x="32" y="336" width="448" height="32"/><rect x="64" y="368" width="384" height="32"/><rect x="96" y="400" width="64" height="32"/><rect x="208" y="400" width="96" height="32"/><rect x="352" y="400" width="64" height="32"/><rect x="96" y="432" width="64" height="48"/><rect x="352" y="432" width="64" height="48"/></g>
    <g fill="#f5f5f8"><rect x="208" y="240" width="96" height="32"/><rect x="176" y="272" width="160" height="32"/><rect x="144" y="304" width="224" height="32"/><rect x="144" y="336" width="224" height="32"/><rect x="176" y="368" width="160" height="32"/></g>
    <g fill="#ffffff"><rect x="96" y="208" width="64" height="64"/><rect x="352" y="208" width="64" height="64"/></g>
    <g fill="#14121a"><rect x="128" y="224" width="32" height="48"/><rect x="352" y="224" width="32" height="48"/></g>
    <g fill="#ffffff"><rect x="128" y="224" width="16" height="16"/><rect x="352" y="224" width="16" height="16"/></g>
    <rect x="240" y="336" width="32" height="16" fill="#5a35cc"/>
  </symbol>
</svg>

<div class="preview-stage">
  <div class="preview-head">
    <span class="px">▣</span> ready check — <span class="px">mobile</span> · 390×780
  </div>
  <div class="phone">
    <div class="phone-scroll">
      <div class="bg-glow"></div>
      <div class="bg-grid"></div>
      <div class="shell">

        <header class="topbar">
          <div class="brand">
            <svg viewBox="0 0 512 512" aria-hidden="true"><use href="#ax"/></svg>
            <span class="wm">PROMPT <span class="a">CLASH</span></span>
          </div>
          <div class="topright">
            <a class="back" href="/">← Vazgeç</a>
            <div class="lang" role="group" aria-label="Dil">
              <button class="on" type="button" aria-pressed="true">TR</button>
              <span class="sep"></span>
              <button type="button" aria-pressed="false">EN</button>
            </div>
          </div>
        </header>

        <section class="head">
          <span class="tag"><span class="d"></span>HAZIR MISIN?</span>
          <h1>Maç başlamak üzere.</h1>
          <p class="sub">İkiniz de hazır olunca otomatik başlar. Promptunu hazırla.</p>
        </section>

        <div class="vs" aria-label="Oyuncular">
          <div class="pcard me">
            <span class="ava me" aria-hidden="true">A</span>
            <span class="pname">AlfaBot · Sen</span>
            <span class="pstate"><span class="pd"></span>Bekliyorsun</span>
          </div>
          <div class="vs-mid" aria-hidden="true">VS</div>
          <div class="pcard opp" aria-live="polite">
            <span class="ava opp" aria-hidden="true">B</span>
            <span class="pname">BetaBot</span>
            <span class="pstate waiting"><span class="pd"></span>Hazırlanıyor</span>
          </div>
        </div>

        <div class="ready-row">
          <button class="cta" type="button">
            Hazırım
            <span class="arrow">→</span>
          </button>
          <a class="cta-secondary" href="/">Yine de vazgeç</a>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
</html>
